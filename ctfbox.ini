[ctfbox]
name="ctfbox"
image="ghcr.io/lore-corrias/ctfbox"
volumes="$HOME/.ssh:/$USER/.ssh:z"
exported_apps="/usr/share/applications/burpsuite.desktop"
hostname="ctfbox"
additional_flags="--env XDG_RUNTIME_DIR=/run/user/1000/"
init_hooks="ln -sf /usr/bin/host-spawn /usr/bin/podman"
init_hooks="ln -sf /usr/bin/host-spawn /usr/bin/podman-compose"
init_hooks="ln -sf /usr/bin/host-spawn /usr/bin/docker"
init_hooks="ln -sf /usr/bin/host-spawn /usr/bin/docker-compose"
init_hooks="ln -sf /usr/bin/host-spawn /usr/bin/devpod"
